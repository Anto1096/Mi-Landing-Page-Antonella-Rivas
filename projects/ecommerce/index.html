<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTienda - Moda y Estilo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">MiTienda</div>
            <ul class="nav-links">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Productos</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
            <div class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-slider">
            <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=1171&auto=format&fit=crop');">
                <div class="slide-content">
                    <h1>Colección de Invierno</h1>
                    <p>Descubre las últimas tendencias para esta temporada.</p>
                    <button class="btn-primary">Ver Colección</button>
                </div>
            </div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1523381294911-8d3cead13475?q=80&w=1170&auto=format&fit=crop');">
                <div class="slide-content">
                    <h1>Básicos Imprescindibles</h1>
                    <p>Prendas versátiles para tu día a día.</p>
                    <button class="btn-primary">Comprar Ahora</button>
                </div>
            </div>
        </section>

        <section class="products-section">
            <h2 class="section-title">Productos Destacados</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="camisas">Camisas</button>
                <button class="filter-btn" data-filter="pantalones">Pantalones</button>
                <button class="filter-btn" data-filter="zapatillas">Zapatillas</button>
            </div>
            <div class="product-grid" id="product-grid">
                <!-- Los productos se renderizarán aquí -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 MiTienda. Todos los derechos reservados.</p>
    </footer>

    <!-- Quick View Modal -->
    <div id="quick-view-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
